<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カラフルブロック崩し</title>
<style>
  body {
    margin: 0;
    background: radial-gradient(circle, #1a2a6c, #0f2027);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  canvas {
    background: #111;
    border-radius: 12px;
    box-shadow: 0 0 20px #00eaff;
  }
</style>
</head>
<body>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// パドル
let paddle = {
  x: 250,
  y: 360,
  width: 100,
  height: 12,
  dx: 0
};

// ボール
let ball = {
  x: 300,
  y: 200,
  radius: 8,
  dx: 4,
  dy: -4
};

// ブロック
let blocks = [];
const colors = ["#ff6b6b", "#feca57", "#48dbfb", "#1dd1a1", "#5f27cd"];

for (let i = 0; i < 5; i++) {
  for (let j = 0; j < 8; j++) {
    blocks.push({
      x: 60 + j * 60,
      y: 40 + i * 30,
      width: 50,
      height: 20,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: Math.random() > 0.5 ? "rect" : "circle",
      alive: true
    });
  }
}

// 操作
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") paddle.dx = 6;
  if (e.key === "ArrowLeft") paddle.dx = -6;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowLeft") paddle.dx = 0;
});

// 描画
function drawPaddle() {
  ctx.fillStyle = "#00eaff";
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.closePath();
}

function drawBlocks() {
  blocks.forEach(b => {
    if (!b.alive) return;

    ctx.fillStyle = b.color;

    if (b.shape === "rect") {
      ctx.fillRect(b.x, b.y, b.width, b.height);
    } else {
      ctx.beginPath();
      ctx.arc(b.x + b.width/2, b.y + b.height/2, b.height/2, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

// 更新
function update() {
  paddle.x += paddle.dx;

  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.width > canvas.width)
    paddle.x = canvas.width - paddle.width;

  ball.x += ball.dx;
  ball.y += ball.dy;

  // 壁反射
  if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;
  if (ball.y < 0) ball.dy *= -1;

  // ゲームオーバー
  if (ball.y > canvas.height) {
    alert("ゲームオーバー！");
    document.location.reload();
  }

  // パドル衝突
  if (
    ball.x > paddle.x &&
    ball.x < paddle.x + paddle.width &&
    ball.y > paddle.y
  ) {
    ball.dy *= -1;
  }

  // ブロック衝突
  blocks.forEach(b => {
    if (!b.alive) return;

    if (
      ball.x > b.x &&
      ball.x < b.x + b.width &&
      ball.y > b.y &&
      ball.y < b.y + b.height
    ) {
      ball.dy *= -1;
      b.alive = false;
    }
  });
}

// ループ
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawPaddle();
  drawBall();
  drawBlocks();
  update();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
